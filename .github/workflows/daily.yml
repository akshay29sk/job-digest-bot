name: Daily LinkedIn Hiring Digest

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SEARCH_QUERY: ${{ vars.SEARCH_QUERY }}
          ROLE_KEYWORDS: ${{ vars.ROLE_KEYWORDS }}
          HIRING_KEYWORDS: ${{ vars.HIRING_KEYWORDS }}
          LOCATION_KEYWORDS: ${{ vars.LOCATION_KEYWORDS }}
          MAX_POSTS: ${{ vars.MAX_POSTS }}
          POSTED_LIMIT: ${{ vars.POSTED_LIMIT }}
          RESULT_LIMIT: ${{ vars.RESULT_LIMIT }}
        run: python main.py
